<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skincare Brand</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#f6f6f6;color:#111;}
    .hero{height:100vh;position:relative;}
    .hero img{width:100%;height:100%;object-fit:cover;filter:grayscale(100%);}
    .hero-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;text-align:center;}
    .hero-text h1{font-size:clamp(2.5rem,6vw,5rem);}
    .cta{margin-top:20px;padding:14px 28px;background:#f5a3b7;border:none;color:white;border-radius:50px;}
    .section{padding:100px 10%;background:white;}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;}
    .split img{width:100%;border-radius:20px;}
    .product-strip{display:flex;justify-content:center;gap:40px;padding:60px 0;}
    .product-strip img{width:180px;border-radius:15px;}
    .statement{position:relative;}
    .statement img{width:100%;border-radius:20px;}
    .statement-text{position:absolute;bottom:40px;left:40px;color:white;font-size:2rem;}
    .why{background:#111;color:white;padding:60px;border-radius:30px;margin-top:60px;}
  </style>
</head>
<body>

<section class="hero">
  <img src="image1.jpg">
  <div class="hero-text">
    <h1>your new favourite skincare brand</h1>
    <button class="cta">Shop Now</button>
  </div>
</section>

<section class="section split">
  <img src="image2.jpg">
  <div>
    <h2>Simplified Skincare</h2>
    <p>Designed to reduce overwhelm and guide users toward a clear action.</p>
  </div>
</section>

<section class="section">
  <div class="product-strip">
    <img src="image3.jpg">
    <img src="image3.jpg">
    <img src="image3.jpg">
  </div>
</section>

<section class="section">
  <div class="statement">
    <img src="image4.jpg">
    <div class="statement-text">happy skin. happy life.</div>
  </div>
</section>

<section class="section">
  <div class="why">
    <h2>Why This Works</h2>
    <p>Reduces cognitive load, improves clarity, and guides user decisions.</p>
  </div>
</section>

</body>
</html>
